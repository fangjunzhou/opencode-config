name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        variant: [base, python]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Build variant ${{ matrix.variant }}
        run: |
          chmod +x scripts/build-distributions.sh
          ./scripts/build-distributions.sh ${{ matrix.variant }}
      
      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.variant }}
          path: distributions/
          retention-days: 1
  
  generate-and-deploy:
    name: Generate Index and Deploy
    needs: build-and-deploy
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Create deployment directory
        run: |
          mkdir -p deploy
          # Copy entire repo content to deploy (file browser will use this)
          cp -r . deploy/
          # Remove git and workflow files from deployment
          rm -rf deploy/.git deploy/.github deploy/.gitignore
          echo "Created deployment directory"
      
      - name: Download all distribution artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
      
      - name: Merge distributions
        run: |
          mkdir -p deploy/distributions
          # Copy all distribution files to the correct location
          for dir in /tmp/artifacts/dist-*/; do
            cp "$dir"* deploy/distributions/ 2>/dev/null || true
          done
          echo "Merged distributions into deploy/distributions"
          ls -lah deploy/distributions/
      
      - name: Generate distribution index
        run: |
          python3 scripts/generate_distribution_index.py deploy/distributions/
      
      - name: Generate directory listing
        run: |
          python3 scripts/generate_directory_listing.py deploy
      
      - name: Create .nojekyll file
        run: |
          touch deploy/.nojekyll
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Print deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Available at:" >> $GITHUB_STEP_SUMMARY
          echo "- Root: https://fangjunzhou.github.io/opencode-config/" >> $GITHUB_STEP_SUMMARY
          echo "- Distributions: https://fangjunzhou.github.io/opencode-config/distributions/" >> $GITHUB_STEP_SUMMARY
