name: Deploy to GitHub Pages (Unified)

on:
  workflow_run:
    workflows: ["Deploy Directory Listing to GitHub Pages", "Build and Deploy Distribution Variants"]
    types: [completed]
    branches: [main]

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  merge-and-deploy:
    name: Merge Artifacts and Deploy
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      
      - name: Prepare deployment directory
        run: |
          mkdir -p deploy
          
          # Copy directory listing from github-pages-listing artifact
          if [ -d "all-artifacts/github-pages-listing" ]; then
            cp -r all-artifacts/github-pages-listing/* deploy/ 2>/dev/null || true
            echo "Copied directory listing"
          fi
          
          # Copy distributions into deploy/distributions/
          if [ -d "all-artifacts/github-pages-distributions" ]; then
            mkdir -p deploy/distributions
            cp all-artifacts/github-pages-distributions/* deploy/distributions/ 2>/dev/null || true
            echo "Copied distributions"
          fi
          
          # List what we're deploying
          echo "Final deployment structure:"
          find deploy -type f | sort
      
      - name: Create .nojekyll file
        run: |
          touch deploy/.nojekyll
      
      - name: Upload merged artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Print deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Available at:" >> $GITHUB_STEP_SUMMARY
          echo "- Root: https://fangjunzhou.github.io/opencode-config/" >> $GITHUB_STEP_SUMMARY
          echo "- Distributions: https://fangjunzhou.github.io/opencode-config/distributions/" >> $GITHUB_STEP_SUMMARY
